      <stop offset="0%" stop-color="#14111c"/>
      <stop offset="100%" stop-color="#08060d"/>
    </radialGradient>
    <pattern id="dscan" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#fff" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <filter id="dg"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <rect width="660" height="400" fill="url(#dbg)"/>
  <rect width="660" height="400" fill="url(#dscan)"/>
  <!-- Brand wordmark -->
  <text x="330" y="64" text-anchor="middle" fill="#5a5869" font-size="11" letter-spacing="6" font-family="monospace">I T A S H A . C O R P</text>
  <!-- Drag hint arrow from app (left, ~x180) to Applications (right, ~x480) -->
