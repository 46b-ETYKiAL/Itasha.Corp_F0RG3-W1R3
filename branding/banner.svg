<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 720" width="1680" height="720">
  <defs>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#fff" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
    </radialGradient>
    <filter id="phosphor"><feGaussianBlur stdDeviation="0.8"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes sweep { 0% { transform: translateY(0); } 100% { transform: translateY(672px); } }
    @keyframes flicker { 0%,96%,100% { opacity: 1; } 97% { opacity: 0.97; } 98% { opacity: 0.99; } }
    @keyframes signalBroadcast { 0% { opacity: 0.8; stroke-dashoffset: 20; } 100% { opacity: 0.2; stroke-dashoffset: 0; } }
    @keyframes endpointBlink { 0%,100% { opacity: 0.9; } 50% { opacity: 0.3; } }
    @keyframes bootReveal { 0% { opacity: 0; } 100% { opacity: 0.9; } }
    @keyframes heartbeat { 0%,100% { r: 3; opacity: 0.5; } 15% { r: 4; opacity: 0.9; } 30% { r: 3; opacity: 0.5; } 45% { r: 3.5; opacity: 0.8; } 60% { r: 3; opacity: 0.5; } }
    @keyframes edgeGlow { 0% { stroke-dashoffset: 4640; } 100% { stroke-dashoffset: 0; } }
    @keyframes phosphorBloom { 0%,100% { opacity: 0; } 50% { opacity: 0.015; } }
    @keyframes curBlink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- Outer bezel -->
  <rect x="0" y="0" width="1680" height="720" rx="18" ry="18" fill="#111118" stroke="#2a2833" stroke-width="2"/>
  <!-- Inner bezel -->
  <rect x="12" y="12" width="1656" height="696" rx="12" ry="12" fill="#18181f"/>
  <!-- Screen -->
  <rect x="24" y="24" width="1632" height="672" rx="6" ry="6" fill="#08060d"/>
  <rect x="24" y="24" width="1632" height="672" rx="6" ry="6" fill="url(#scanlines)"/>
  <rect x="24" y="24" width="1632" height="672" rx="6" ry="6" fill="url(#vignette)"/>

  <!-- Edge glow + scanline sweep + phosphor bloom -->
  <rect x="24" y="24" width="1632" height="672" rx="6" ry="6" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.06" stroke-dasharray="20,4640" style="animation: edgeGlow 12s linear infinite;"/>
  <rect x="24" y="24" width="1632" height="2" fill="#00e5ff" opacity="0.03" style="animation: sweep 10s linear infinite;"/>
  <rect x="24" y="24" width="1632" height="672" rx="6" ry="6" fill="white" opacity="0" style="animation: phosphorBloom 8s ease-in-out infinite;"/>

  <g style="animation: flicker 6s infinite;">
    <!-- House header + framework name -->
    <text x="840" y="96" text-anchor="middle" fill="#5a5869" font-size="13" letter-spacing="7" filter="url(#phosphor)">I T A S H A . C O R P</text>
    <text x="840" y="166" text-anchor="middle" fill="#00e5ff" font-size="52" font-weight="bold" letter-spacing="12" filter="url(#glow)">F 0 R G 3 - W 1 R 3</text>
    <text x="840" y="200" text-anchor="middle" fill="#a020ff" font-size="14" letter-spacing="6" filter="url(#phosphor)">ONE CONFIG · EVERY PLATFORM · BRANDED INSTALLERS</text>

    <!-- Packaging sequence (cross-platform forge) -->
    <g fill="#00e5ff" font-size="14" filter="url(#phosphor)" opacity="0.9">
      <text x="80" y="280">forge.wire ──────────────────────────────</text>
      <text x="80" y="320" xml:space="preserve" style="animation: bootReveal 0.3s ease-out 0.2s both;">&gt; template.merge(app.override)<tspan dx="16" fill="#01fe36">[ OK ]</tspan></text>
      <text x="80" y="356" xml:space="preserve" style="animation: bootReveal 0.3s ease-out 0.5s both;">&gt; package.windows(nsis)<tspan dx="16" fill="#01fe36">[ OK ]</tspan></text>
      <text x="80" y="392" xml:space="preserve" style="animation: bootReveal 0.3s ease-out 0.8s both;">&gt; package.macos(dmg)<tspan dx="16" fill="#01fe36">[ OK ]</tspan></text>
      <text x="80" y="428" xml:space="preserve" style="animation: bootReveal 0.3s ease-out 1.1s both;">&gt; package.linux(appimage,deb)<tspan dx="16" fill="#01fe36">[ OK ]</tspan></text>
      <text x="80" y="464" xml:space="preserve" style="animation: bootReveal 0.3s ease-out 1.4s both;">&gt; sign.staple.checksum()<tspan dx="16" fill="#01fe36">[ OK ]</tspan></text>
      <text x="80" y="500">─────────────────────────────────────────</text>
      <text x="80" y="544">forge@wired:~$ wire --ship<tspan dx="8" fill="#00e5ff" style="animation: curBlink 1.1s step-end infinite;">█</tspan></text>
    </g>
    <text x="80" y="584" fill="#5a5869" font-size="12" letter-spacing="2" filter="url(#phosphor)">binaries in · installers out</text>

    <!-- Unique element: the forge bus — one source line fanning out to 3 OS endpoints -->
    <g transform="translate(1140, 282)">
      <line x1="60" y1="0" x2="60" y2="262" stroke="#00e5ff" stroke-width="2.5" filter="url(#glow)"/>
      <circle cx="60" cy="0" r="4" fill="#00e5ff" opacity="0.9" filter="url(#glow)"/>
      <!-- Akira-red signal arc off the top -->
      <path d="M 68 -4 Q 86 -18 70 -34" fill="none" stroke="#ff0040" stroke-width="1.5" opacity="0.8" filter="url(#glow)"/>

      <line x1="60" y1="52" x2="232" y2="52" stroke="#00e5ff" stroke-width="1.5" opacity="0.9" stroke-dasharray="6,3" style="animation: signalBroadcast 1.5s linear infinite;"/>
      <circle cx="232" cy="52" r="5" fill="none" stroke="#00e5ff" stroke-width="1.5" style="animation: endpointBlink 2s ease-in-out infinite;"/>
      <circle cx="232" cy="52" r="2" fill="#00e5ff" style="animation: endpointBlink 2s ease-in-out infinite;"/>
      <text x="244" y="56" fill="#5a5869" font-size="10" opacity="0.8">WIN/NSIS</text>

      <line x1="60" y1="116" x2="212" y2="116" stroke="#e020ff" stroke-width="1.5" opacity="0.7" stroke-dasharray="6,3" style="animation: signalBroadcast 2s linear infinite;"/>
      <circle cx="212" cy="116" r="5" fill="none" stroke="#e020ff" stroke-width="1.5" style="animation: endpointBlink 2s ease-in-out 0.4s infinite;"/>
      <circle cx="212" cy="116" r="2" fill="#e020ff" style="animation: endpointBlink 2s ease-in-out 0.4s infinite;"/>
      <text x="224" y="120" fill="#5a5869" font-size="10" opacity="0.8">MAC/DMG</text>

      <line x1="60" y1="180" x2="192" y2="180" stroke="#00ffb3" stroke-width="1.5" opacity="0.6" stroke-dasharray="6,3" style="animation: signalBroadcast 2.5s linear infinite;"/>
      <circle cx="192" cy="180" r="5" fill="none" stroke="#00ffb3" stroke-width="1.5" style="animation: endpointBlink 2s ease-in-out 0.8s infinite;"/>
      <circle cx="192" cy="180" r="2" fill="#00ffb3" style="animation: endpointBlink 2s ease-in-out 0.8s infinite;"/>
      <text x="204" y="184" fill="#5a5869" font-size="10" opacity="0.8">LINUX/APPIMG</text>

      <text x="20" y="288" fill="#5a5869" font-size="9">MIT OR Apache-2.0</text>
      <!-- kanji 配布 (distribution) -->
      <text x="128" y="232" fill="#a020ff" font-size="42" opacity="0.18" font-family="'Noto Sans JP',sans-serif">配布</text>
    </g>
  </g>

  <!-- Corner brackets -->
  <path d="M 40,40 L 40,72 M 40,40 L 72,40" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.1"/>
  <path d="M 1640,40 L 1640,72 M 1640,40 L 1608,40" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.1"/>
  <path d="M 40,680 L 40,648 M 40,680 L 72,680" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.1"/>
  <path d="M 1640,680 L 1640,648 M 1640,680 L 1608,680" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.1"/>

  <!-- Status dots -->
  <circle cx="50" cy="676" r="3" fill="#01fe36" opacity="0.5" style="animation: heartbeat 2s ease-in-out infinite;"/>
  <circle cx="62" cy="676" r="3" fill="#00e5ff" opacity="0.4"/>
  <circle cx="74" cy="676" r="3" fill="#5a5869" opacity="0.3"/>

  <!-- Bezel labels + power LED -->
  <text x="40" y="712" font-size="9" fill="#4a4859" letter-spacing="2">ITASHA.CORP</text>
  <text x="1640" y="712" text-anchor="end" font-size="9" fill="#4a4859">CRT-F0RG3W1R3</text>
  <circle cx="1640" cy="700" r="6" fill="#01fe36" opacity="0.3"/>
  <circle cx="1640" cy="700" r="4" fill="#01fe36" opacity="1.0"/>
</svg>
