<svg xmlns="http://www.w3.org/2000/svg" width="164" height="314" viewBox="0 0 164 314" role="img" aria-label="C0PL4ND installer — by Itasha.Corp">
  <title>C0PL4ND installer sidebar</title>
  <!--
    F0RG3-W1R3 per-app installer sidebar (164x314). Same wired-noir / NERV
    title-card language as the SCR1B3 sidebar (shared Itasha.Corp surface), but
    customized to the C0PL4ND terminal identity: a prompt-chevron + cursor-block
    mark and a live command-line motif. Wordmark in horizontally-squeezed Times
    New Roman (Liberation Serif on Linux). See INSTALLER-BRANDING.md.
  -->
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0810"/>
      <stop offset="1" stop-color="#070509"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="44%" r="72%">
      <stop offset="60%" stop-color="#08060d" stop-opacity="0"/>
      <stop offset="100%" stop-color="#08060d" stop-opacity="0.7"/>
    </radialGradient>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1.5" fill="#f0eef5" opacity="0.035"/>
    </pattern>
    <filter id="phos" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="164" height="314" fill="url(#plate)"/>
  <rect width="164" height="314" fill="url(#glow)"/>
  <rect width="164" height="314" fill="url(#scan)"/>
  <rect width="164" height="314" fill="url(#vig)"/>

  <rect x="6.5" y="6.5" width="151" height="301" fill="none" stroke="#a020ff" stroke-opacity="0.45" stroke-width="1"/>
  <g stroke="#00e5ff" stroke-width="1.4" stroke-opacity="0.9">
    <path d="M10 18 V10 H18"/><path d="M154 18 V10 H146"/>
    <path d="M10 296 V304 H18"/><path d="M154 296 V304 H146"/>
  </g>

  <!-- app mark: prompt chevron + cursor block in a ring (terminal) -->
  <g transform="translate(82,64)" filter="url(#phos)">
    <circle r="26" fill="none" stroke="#00e5ff" stroke-width="2"/>
    <circle r="26" fill="none" stroke="#a020ff" stroke-width="1" stroke-opacity="0.5" transform="scale(1.16)"/>
    <path d="M-13 -9 L-2 0 L-13 9" fill="none" stroke="#00e5ff" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="3" y="-4" width="11" height="9" fill="#00e5ff"/>
  </g>

  <!-- wordmark: copland / by / Itasha.Corp -->
  <g font-family="'Times New Roman','Liberation Serif',serif" text-anchor="middle">
    <g transform="translate(82,150)" filter="url(#phos)">
      <text x="0" y="0" transform="scale(0.68,1)" font-size="44" letter-spacing="0.5"
            fill="#00e5ff">copland</text>
    </g>
    <text x="82" y="178" font-family="'Arial Narrow',Arial,sans-serif" font-size="11"
          letter-spacing="5" fill="#f0eef5" fill-opacity="0.62">BY</text>
    <g transform="translate(82,206)">
      <text x="0" y="0" transform="scale(0.74,1)" font-size="22" letter-spacing="0.5"
            fill="#f0eef5">Itasha.Corp</text>
    </g>
  </g>

  <!-- terminal motif: prompt + command rule + live block cursor -->
  <g transform="translate(30,250)" font-family="'Courier New',monospace">
    <text x="0" y="4" font-size="13" fill="#00e5ff">&gt;</text>
    <line x1="13" y1="0" x2="86" y2="0" stroke="#1b3640" stroke-width="3" stroke-linecap="round"/>
    <rect x="90" y="-5" width="8" height="10" fill="#00e5ff"/>
    <line x1="0" y1="13" x2="58" y2="13" stroke="#142a31" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- tagline -->
  <text x="82" y="291" text-anchor="middle" font-family="'Arial Narrow',Arial,sans-serif"
        font-size="6.2" letter-spacing="1.2" fill="#00e5ff" fill-opacity="0.72">GPU-ACCELERATED TERMINAL</text>
</svg>
