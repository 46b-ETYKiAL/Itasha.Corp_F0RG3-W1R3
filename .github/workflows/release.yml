name: Release

# Tag-gated cross-platform installer release.
#
# Triggered ONLY by a version tag (v*) — NOT on every push, to contain
# GitHub Actions minutes (quota_ceilings). For each OS it:
#   1. builds the installer via the build wrapper (scripts/build.{sh,ps1});
#   2. signs (Windows signtool / macOS Developer ID) when the platform's
#      signing secrets are present, else builds UNSIGNED with a LOUD notice;
#   3. (macOS) notarizes + staples;
#   4. emits checksum.sha256;
#   5. uploads the artifacts.
#
# SECURITY:
#   * Every third-party Action is SHA-pinned (tj-actions Mar-2025 lesson).
#   * GITHUB_TOKEN is least-privilege per job (read by default; the publish
#     job alone gets contents: write to attach release assets).
#   * All signing material is referenced BY NAME from secrets — never literal.
#   * Signing is GATED on secret presence; it is never faked.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      app:
        description: "Per-app override to package (apps/<app>.toml)"
        required: true
        default: "c0pl4nd"

# Least-privilege default for all jobs; the publish job widens to write.
permissions:
  contents: read

concurrency:
  # Single-fire per tag so parallel tag pushes cannot race the release.
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: ${{ github.event.inputs.app || 'c0pl4nd' }}
  CARGO_PACKAGER_VERSION: "0.11.8"
  # Reproducible-build epoch: pin all archive/file mtimes to the tag's commit
  # timestamp so the UNSIGNED payload hash is stable run-to-run
  # (determinism_reproducibility axis). Falls back to a fixed constant when the
  # commit timestamp is unavailable (e.g. workflow_dispatch dry-run).
  SOURCE_DATE_EPOCH: "0"

jobs:
  # ---------------------------------------------------------------------------
  # Build matrix — one build+sign job per OS on its native runner.
  # `if: always()` so a conditional cell can never be reported as a green
  # required check while having silently skipped (merge-queue-check-gating).
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.os }}
    if: always()
    runs-on: ${{ matrix.os }}
    permissions:
      # Least-privilege at the JOB level (not workflow level): read source +
      # the two scopes keyless provenance/cosign need. id-token mints the
      # short-lived OIDC token Sigstore exchanges for a keyless cert;
      # attestations writes the SLSA-L2 provenance to the attestations store.
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # No git push from this job; do not persist the token (zizmor artipacked).
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # dtolnay/rust-toolchain@stable (pinned to the real stable-branch HEAD SHA)
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      # Derive SOURCE_DATE_EPOCH from the tagged commit's author timestamp so
      # the unsigned payload is byte-reproducible across runs/runners. On a
      # workflow_dispatch dry-run (no tag) the env default ("0") is kept.
      - name: Pin SOURCE_DATE_EPOCH from commit
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse HEAD >/dev/null 2>&1; then
            sde="$(git -C "${GITHUB_WORKSPACE}" log -1 --pretty=%ct 2>/dev/null || echo 0)"
            echo "SOURCE_DATE_EPOCH=${sde}" >> "$GITHUB_ENV"
            echo "::notice::SOURCE_DATE_EPOCH pinned to ${sde} (commit author time) for reproducible builds."
          else
            echo "::warning::No git history available; SOURCE_DATE_EPOCH stays at the env default (reproducibility weakened for this run)."
          fi

      - name: Install cargo-packager (pinned, locked)
        shell: bash
        run: cargo install cargo-packager --version "${CARGO_PACKAGER_VERSION}" --locked

      - name: Install minisign (free, cross-platform signing)
        shell: bash
        run: |
          set -euo pipefail
          case "${{ runner.os }}" in
            Linux)   sudo apt-get update && sudo apt-get install -y minisign ;;
            macOS)   brew install minisign ;;
            Windows) choco install minisign -y --no-progress ;;
          esac
          minisign -v || echo "::warning::minisign version probe non-zero (continuing)"

      # The compiled app binary is consumed as a BUILD INPUT, never vendored.
      # In a real release this step downloads the signed app's release binary
      # (binary-input-contract.md). Here it documents the contract; the build
      # wrapper fails loudly if no binary is supplied.
      - name: Resolve app binary input
        id: binary
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ITASHA_BINARY_PATH:-}" ]; then
            echo "::notice::No ITASHA_BINARY_PATH supplied — running config dry-run."
            echo "dry_run=1" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=0" >> "$GITHUB_OUTPUT"
          fi

      # --- Windows build ---
      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERT_THUMBPRINT: ${{ secrets.WINDOWS_CERT_THUMBPRINT }}
          # Hoist untrusted step output into env so it is never expanded
          # directly into the shell (zizmor template-injection).
          DRY_RUN: ${{ steps.binary.outputs.dry_run }}
        run: |
          if ("$env:DRY_RUN" -eq "1") {
            .\scripts\build.ps1 -App $env:APP_NAME -DryRun
          } else {
            .\scripts\build.ps1 -App $env:APP_NAME
          }
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERT_THUMBPRINT)) {
            Write-Host "::warning::BUILDING UNSIGNED (Windows) — WINDOWS_CERT_THUMBPRINT secret absent. SmartScreen will warn until signed. See docs/adr/0003-signing-posture.md."
          } else {
            Write-Host "::notice::Windows signing credential present; signtool path engaged."
          }

      # --- macOS build + sign + notarize + staple ---
      - name: Build installer (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          # Hoist untrusted step output into env so it is never expanded
          # directly into the shell (zizmor template-injection).
          DRY_RUN: ${{ steps.binary.outputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "1" ]; then
            ./scripts/build.sh --app "$APP_NAME" --dry-run
          else
            ./scripts/build.sh --app "$APP_NAME"
          fi
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "::warning::BUILDING UNSIGNED (macOS) — Apple Developer ID secrets absent. Gatekeeper will block until notarized. See docs/adr/0003-signing-posture.md (Apple Developer Program is a real \$99/yr dependency)."
          else
            echo "::notice::Apple signing identity present; sign+notarize+staple engaged."
            # The dmg path is produced by cargo-packager under dist/; the helper
            # detects absent creds itself and exits 0 honestly if so.
            ./packaging/macos/sign-notarize-staple.sh || true
          fi

      # --- Linux build ---
      - name: Build installer (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          # Hoist untrusted step output into env so it is never expanded
          # directly into the shell (zizmor template-injection).
          DRY_RUN: ${{ steps.binary.outputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "1" ]; then
            ./scripts/build.sh --app "$APP_NAME" --dry-run
          else
            ./scripts/build.sh --app "$APP_NAME"
          fi
          echo "::notice::Linux artifacts (AppImage + .deb) are integrity-verified via checksum.sha256 + minisign public key (no OS signing gate)."

      # --- Free-signing tiers (run before checksums so hashes cover signed bytes) ---
      - name: Sign — Windows Authenticode (free self-signed or paid OV/EV cert)
        if: runner.os == 'Windows' && steps.binary.outputs.dry_run == '0'
        shell: pwsh
        env:
          WINDOWS_CERT_THUMBPRINT: ${{ secrets.WINDOWS_CERT_THUMBPRINT }}
        run: .\scripts\sign-windows.ps1

      - name: Sign — macOS ad-hoc (free local integrity when no Developer ID)
        if: runner.os == 'macOS' && steps.binary.outputs.dry_run == '0'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: ./scripts/sign-macos-adhoc.sh

      - name: Sign — minisign detached signatures (free, all platforms)
        if: steps.binary.outputs.dry_run == '0'
        shell: bash
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: ./scripts/sign-artifacts.sh

      - name: Generate checksums
        if: steps.binary.outputs.dry_run == '0'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          if ls dist/* >/dev/null 2>&1; then
            ( cd dist && for f in *; do
                if [ -f "$f" ] && [ "$f" != "checksum.sha256" ]; then
                  if command -v sha256sum >/dev/null 2>&1; then
                    sha256sum "$f" >> checksum.sha256
                  else
                    shasum -a 256 "$f" >> checksum.sha256
                  fi
                fi
              done )
          else
            echo "No dist/ artifacts to checksum (dry-run path)."
          fi

      # --- Supply-chain provenance / SBOM / keyless signing ---------------
      # These run AFTER checksums so attestation + cosign cover the final
      # (free-tier-signed) bytes that ship. Each is free + CI-native; no paid
      # service. SBOM + provenance always run on a real build; cosign is GATED
      # on the OIDC token being mintable (honest-skip + LOUD warning otherwise).

      # CycloneDX SBOM over the bundled artifact dir via syft (anchore).
      # Emits dist/sbom.cdx.json describing every component in the release
      # bundle so downstream consumers can audit the dependency surface.
      - name: Generate CycloneDX SBOM (syft)
        id: sbom
        if: steps.binary.outputs.dry_run == '0'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: dist/
          format: cyclonedx-json
          output-file: dist/sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Checksum the SBOM
        if: steps.binary.outputs.dry_run == '0'
        shell: bash
        run: |
          set -euo pipefail
          if [ -f dist/sbom.cdx.json ]; then
            ( cd dist && \
              if command -v sha256sum >/dev/null 2>&1; then \
                sha256sum sbom.cdx.json > sbom.cdx.json.sha256; \
              else \
                shasum -a 256 sbom.cdx.json > sbom.cdx.json.sha256; \
              fi )
            echo "::notice::CycloneDX SBOM emitted at dist/sbom.cdx.json (+ .sha256)."
          else
            echo "::warning::SBOM step produced no dist/sbom.cdx.json — release will ship without an SBOM."
          fi

      # Install cosign for keyless sign-blob. Pinned installer action.
      - name: Install cosign
        if: steps.binary.outputs.dry_run == '0'
        uses: sigstore/cosign-installer@4959ce089c160fddf62f7b42464195ba1a56d382 # v3.6.0
        with:
          cosign-release: "v2.4.1"

      # Keyless cosign sign-blob over each native installer (.exe/.dmg/.AppImage)
      # using the workflow's ambient OIDC identity (Fulcio short-lived cert,
      # Rekor transparency log). Emits <artifact>.sig + <artifact>.pem alongside.
      # GATED on the OIDC token id-token claim being mintable; when it is not
      # (forks without id-token: write, or a misconfigured runner) we emit a
      # LOUD warning and skip — we NEVER fabricate a .sig/.pem.
      - name: cosign sign-blob (keyless OIDC) over native installers
        if: steps.binary.outputs.dry_run == '0'
        shell: bash
        env:
          # ACTIONS_ID_TOKEN_REQUEST_URL is injected by GitHub only when the job
          # has id-token: write AND the run can mint OIDC tokens. Its presence is
          # the honest gate for keyless signing.
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "::warning::cosign keyless signing SKIPPED — no OIDC token available (ACTIONS_ID_TOKEN_REQUEST_URL unset; e.g. a fork PR without id-token: write). Artifacts ship with checksum.sha256 + minisign only. Nothing was faked."
            exit 0
          fi
          if ! command -v cosign >/dev/null 2>&1; then
            echo "::warning::cosign binary not found after install step — skipping keyless sign-blob (no fake signatures produced)."
            exit 0
          fi
          signed=0
          for f in dist/*.exe dist/*.dmg dist/*.AppImage; do
            [ -f "$f" ] || continue
            echo "::notice::cosign sign-blob (keyless) -> ${f}.sig / ${f}.pem"
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
            signed=$((signed + 1))
          done
          if [ "$signed" -eq 0 ]; then
            echo "::warning::cosign found no native installer (.exe/.dmg/.AppImage) in dist/ to sign on this runner."
          else
            echo "::notice::cosign keyless-signed ${signed} native installer artifact(s)."
          fi

      # SLSA-L2 keyless build provenance, one attestation per release artifact.
      # GATED on a real (non-empty) dist/ so an empty bundle cannot mint an
      # attestation over nothing. Verifiable later with `gh attestation verify`.
      - name: Attest build provenance (SLSA L2, keyless)
        if: steps.binary.outputs.dry_run == '0' && hashFiles('dist/**') != ''
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb # v2.1.0
        with:
          subject-path: "dist/*"

      - name: Provenance honest-skip notice
        if: steps.binary.outputs.dry_run == '0' && hashFiles('dist/**') == ''
        shell: bash
        run: echo "::warning::Build-provenance attestation SKIPPED — dist/ is empty on this runner. No attestation was minted over a non-existent artifact."

      - name: Upload build artifacts
        if: steps.binary.outputs.dry_run == '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installer-${{ matrix.os }}
          path: dist/
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Publish — attaches collected artifacts to the GitHub Release. Runs only on
  # a real tag push (not on workflow_dispatch dry-runs). This is the only job
  # granted contents: write.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f -exec cp -v {} release/ \; || true
          echo "Staged $(find release -type f | wc -l) release files."

      # Emit the cargo-packager-updater feed (latest.json) from the per-artifact
      # minisign signatures the build job produced. cargo-packager-updater
      # verifies each platform's signature against the embedded public key, so
      # the feed itself needs no extra signing. GATED on .minisig presence:
      # no signatures (MINISIGN_SECRET_KEY absent in build) => no feed +
      # ::warning:: (gated-not-faked). Shape: packager.template.toml
      # [itasha.updater_feed]. latest.json is attached by the gh-release step
      # below (files: release/*), resolving the releases/latest/download
      # endpoint the C0PL4ND override points at.
      - name: Emit cargo-packager-updater feed (latest.json)
        if: hashFiles('release/*.minisig') != ''
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python3 - "$VERSION" "$BASE" "$PUB_DATE" <<'PY'
          import glob, json, os, sys
          version, base, pub_date = sys.argv[1], sys.argv[2], sys.argv[3]
          plat = {".exe": "windows-x86_64", ".msi": "windows-x86_64",
                  ".dmg": "darwin-universal", ".AppImage": "linux-x86_64"}
          platforms = {}
          for f in sorted(glob.glob("release/*")):
              for ext, key in plat.items():
                  if f.endswith(ext):
                      sig = ""
                      if os.path.exists(f + ".minisig"):
                          sig = open(f + ".minisig", encoding="utf-8").read().strip()
                      platforms[key] = {"signature": sig,
                                        "url": f"{base}/{os.path.basename(f)}"}
          feed = {"version": version, "notes": f"C0PL4ND {version}",
                  "pub_date": pub_date, "platforms": platforms}
          with open("release/latest.json", "w", encoding="utf-8") as fh:
              json.dump(feed, fh, indent=2)
          print(f"emitted release/latest.json with {len(platforms)} platform(s)")
          PY
          echo "::notice::updater feed latest.json emitted from per-artifact minisign signatures."

      - name: Updater feed skipped (no signatures)
        if: hashFiles('release/*.minisig') == ''
        run: echo "::warning::updater feed (latest.json) SKIPPED — no .minisig signatures present (MINISIGN_SECRET_KEY absent in build). Gated-not-faked."

      # Attach artifacts using the runner's pre-installed `gh` CLI rather than a
      # third-party action (zizmor superfluous-actions). Creates the release for
      # the tag if it does not exist yet, otherwise uploads/clobbers assets onto
      # the existing release. Mirrors the prior fail_on_unmatched_files: false
      # behaviour by guarding on glob presence before upload.
      - name: Attach artifacts to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No release/* artifacts found — nothing to attach."
            exit 0
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --clobber
          else
            gh release create "$TAG" "${files[@]}" \
              --title "C0PL4ND $TAG" \
              --generate-notes
          fi

      # actions/checkout@v6.0.2 — needed for the manifest-update tool.
      - name: Checkout (manifest tooling)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: framework
          # No git push from this job; do not persist the token (zizmor artipacked).
          persist-credentials: false

      - name: Set up Python (manifest tooling)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # Fill winget / Homebrew / Scoop manifest hashes from the uploaded
      # artifacts. GATED: only runs when at least one release artifact exists
      # (an empty release produces no hashes — WezTerm #7713 avoidance). Emits
      # the resolved manifests as build artifacts for the maintainer to submit;
      # it does NOT auto-submit to any package-manager repo (that is a separate
      # user-authorized publish step).
      - name: Update package-manager manifest hashes
        if: hashFiles('release/*') != ''
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          python framework/packaging/manifests/update_manifests.py \
            --version "$VERSION" \
            --release-dir release \
            --manifest-root framework/packaging/manifests \
            --out-dir resolved-manifests \
            --repo "${GITHUB_REPOSITORY}"

      - name: Upload resolved manifests
        if: hashFiles('release/*') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: resolved-manifests
          path: resolved-manifests/
          if-no-files-found: warn
