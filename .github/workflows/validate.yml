name: Validate

# Validates the installer framework itself: workflow lint, shell lint, and
# config/manifest schema checks. Runs on every PR and push. No secrets, no
# build, no network egress beyond fetching the pinned tools.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint & schema-validate
    # Always run so a skipped job can never be reported as a green required
    # check on a merge queue (merge-queue-check-gating discipline).
    if: always()
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        # actions/setup-python@v5.3.0
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.12"

      - name: Install actionlint (pinned)
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.7"
          curl -fsSL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -version

      - name: Lint workflows (actionlint)
        run: ./actionlint -color

      - name: Lint shell scripts (shellcheck)
        run: |
          set -euo pipefail
          # shellcheck is preinstalled on ubuntu-latest runners.
          shellcheck --version
          # Lint every POSIX shell script in the framework tree.
          found=0
          while IFS= read -r script; do
            found=1
            shellcheck "$script"
          done < <(find packaging scripts tests -name '*.sh' 2>/dev/null)
          if [ "$found" -eq 0 ]; then
            echo "No shell scripts found to lint (acceptable at this stage)."
          fi

      - name: Validate packager TOML + per-app overrides
        run: |
          set -euo pipefail
          python tests/validate_config.py packager.template.toml apps/*.toml

      - name: Validate package-manager manifests (parse)
        run: |
          set -euo pipefail
          python - <<'PY'
          import glob, json, sys, yaml
          ok = True
          for f in glob.glob("packaging/manifests/winget/*.yaml"):
              try:
                  yaml.safe_load(open(f, encoding="utf-8"))
                  print("winget OK:", f)
              except Exception as e:  # noqa: BLE001 - report-and-continue parse check
                  ok = False
                  print("winget FAIL:", f, e)
          try:
              json.load(open("packaging/manifests/scoop/c0pl4nd.json", encoding="utf-8"))
              print("scoop OK")
          except Exception as e:  # noqa: BLE001 - report-and-continue parse check
              ok = False
              print("scoop FAIL:", e)
          sys.exit(0 if ok else 1)
          PY

      - name: Syntax-check manifest tooling
        run: python -m py_compile packaging/manifests/update_manifests.py

      - name: Content-safety / IP-boundary audit
        run: python tests/content_safety_audit.py
