name: CI

# Best-in-class CI for the F0RG3-W1R3 installer framework (public OSS).
# Lints shell + PowerShell + Python, schema-validates packaging config, runs
# the content-safety/IP-boundary audit as a REQUIRED gate, lints the workflows
# themselves (actionlint + zizmor), and dry-run-verifies the signing flow.
# Supersedes the prior validate.yml (keep one or the other, not both).
# All third-party actions pinned by full commit SHA.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-validate:
    name: Lint & schema-validate
    # ALWAYS run so a skipped job cannot be reported as a green required check.
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Python lint tooling (ruff, hash-pinned)
        run: |
          set -euo pipefail
          # Hash-pinned per OSSF Scorecard Pinned-Dependencies (pipCommand).
          # Pins pip + ruff==0.15.14 by sha256; see .github/requirements-ci.txt.
          python -m pip install --require-hashes -r .github/requirements-ci.txt

      - name: Ruff lint (Python test/validation scripts)
        run: ruff check tests packaging

      - name: Ruff format check
        run: ruff format --check tests packaging

      - name: Install actionlint (pinned)
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.12"
          curl -fsSL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -version

      - name: Lint workflows (actionlint)
        run: ./actionlint -color

      - name: Lint shell scripts (shellcheck)
        run: |
          set -euo pipefail
          shellcheck --version
          found=0
          while IFS= read -r script; do
            found=1
            # --severity=warning filters out info-level findings (e.g. SC1091
            # "not following sourced file" for libs resolved only at runtime).
            shellcheck --severity=warning "$script"
          done < <(find packaging scripts tests -name '*.sh' 2>/dev/null)
          if [ "$found" -eq 0 ]; then
            echo "No shell scripts found to lint."
          fi

      - name: Check shell formatting (shfmt)
        run: |
          set -euo pipefail
          SHFMT_VERSION="3.13.1"
          curl -fsSL -o shfmt \
            "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64"
          chmod +x shfmt
          # -d = diff (non-zero exit on unformatted); -i 2 two-space indent.
          # Per-script loop with -print0 avoids word-splitting on paths with
          # spaces (the unquoted $(find ...) form trips actionlint SC2046).
          while IFS= read -r -d '' script; do
            ./shfmt -d -i 2 -ci "$script"
          done < <(find packaging scripts tests -name '*.sh' -print0 2>/dev/null)

      - name: Validate packager TOML + per-app overrides
        run: python tests/validate_config.py packager.template.toml apps/*.toml

      - name: Content-safety / IP-boundary audit (REQUIRED gate)
        run: python tests/content_safety_audit.py

  powershell-lint:
    name: PSScriptAnalyzer
    if: always()
    # PSScriptAnalyzer runs cross-platform on PowerShell Core, but the .ps1
    # signing scripts target Windows — lint on a Windows runner for fidelity.
    runs-on: windows-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -RequiredVersion 1.24.0
          $results = Get-ChildItem -Recurse -Filter *.ps1 -Path scripts,packaging,tests |
            ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName -Severity Warning,Error }
          if ($results) {
            $results | Format-Table -AutoSize
            $errors = $results | Where-Object { $_.Severity -eq 'Error' }
            if ($errors) { Write-Error "PSScriptAnalyzer found errors."; exit 1 }
            Write-Warning "PSScriptAnalyzer found warnings (non-blocking)."
          } else {
            Write-Host "PSScriptAnalyzer: clean."
          }

  signing-dry-run:
    name: Signing-flow dry run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Verifies the verify/sign scripts parse and their CLI contract holds,
      # WITHOUT touching any real signing secret. No secrets are referenced here.
      - name: Static-check signing + verify scripts
        run: |
          set -euo pipefail
          for s in scripts/sign-artifacts.sh scripts/sign-macos-adhoc.sh scripts/verify.sh; do
            [ -f "$s" ] && bash -n "$s" && echo "syntax OK: $s"
          done

  secret-hygiene:
    name: Secret hygiene (gitleaks)
    # ALWAYS run so a skipped job cannot be reported as a green required check.
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so the gitleaks history scan covers every commit.
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks (pinned)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.1"
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks version

      - name: Gitleaks — working tree (no-git)
        run: ./gitleaks detect --source . --no-git --config .gitleaks.toml --redact

      - name: Gitleaks — full history
        run: ./gitleaks detect --source . --config .gitleaks.toml --redact

  native-installer:
    name: Native installer crate (headless)
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      # eframe/glow needs the GL + X11 dev headers to compile on Linux even for
      # the headless (--no-default-features) build; install them.
      - name: Install Linux GUI build deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libssl-dev

      - name: Build installer crate (headless, --no-default-features)
        run: cargo build --manifest-path installer/Cargo.toml --no-default-features --locked

      - name: Test installer crate (headless)
        run: cargo test --manifest-path installer/Cargo.toml --no-default-features --locked

      - name: Install cargo-audit (pinned)
        run: cargo install cargo-audit --version 0.21.2 --locked

      - name: cargo-audit (vulnerability scan)
        run: cargo audit --file installer/Cargo.lock

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint-and-validate, powershell-lint, signing-dry-run, secret-hygiene, native-installer]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        run: |
          set -euo pipefail
          declare -A results=(
            [lint-and-validate]="${{ needs.lint-and-validate.result }}"
            [powershell-lint]="${{ needs.powershell-lint.result }}"
            [signing-dry-run]="${{ needs.signing-dry-run.result }}"
            [secret-hygiene]="${{ needs.secret-hygiene.result }}"
            [native-installer]="${{ needs.native-installer.result }}"
          )
          failed=0
          for job in "${!results[@]}"; do
            echo "${job} = ${results[$job]}"
            if [ "${results[$job]}" != "success" ]; then failed=1; fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::One or more required jobs did not succeed."
            exit 1
          fi
          echo "All required jobs succeeded."
