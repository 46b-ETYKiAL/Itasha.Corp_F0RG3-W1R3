<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 500" width="1280" height="500" role="img" aria-label="F0RG3-W1R3 — forge an installer from a binary, wire it onto every platform">
  <defs>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="1280" height="4">
      <rect width="1280" height="2" fill="transparent"/><rect y="2" width="1280" height="2" fill="rgba(0,0,0,0.16)"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="48%" r="72%">
      <stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.46)"/>
    </radialGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00fffe" stop-opacity="0"/><stop offset="100%" stop-color="#00fffe" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="phos"><feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="2.4"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="sc"><rect x="28" y="22" width="1224" height="452" rx="6"/></clipPath>
  </defs>
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace; }
    @keyframes sweep { 0% { transform: translateY(0); } 100% { transform: translateY(452px); } }
    @keyframes flicker { 0%,96%,100% { opacity: 1; } 97% { opacity: 0.97; } 98% { opacity: 0.995; } }
    @keyframes bootReveal { 0% { opacity: 0; } 100% { opacity: 0.92; } }
    @keyframes curBlink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    @keyframes heartbeat { 0%,100% { r: 4; opacity: 0.55; } 15% { r: 5; opacity: 0.95; } 30% { r: 4; opacity: 0.55; } 50% { r: 4.4; opacity: 0.8; } }
    @keyframes edgeGlow { 0% { stroke-dashoffset: 3340; } 100% { stroke-dashoffset: 0; } }
    @keyframes phosphorBloom { 0%,100% { opacity: 0; } 50% { opacity: 0.02; } }
    @keyframes signalPulse { 0% { stroke-dashoffset: 18; opacity: 0.85; } 100% { stroke-dashoffset: 0; opacity: 0.3; } }
    @keyframes nodeBlink { 0%,100% { opacity: 0.9; } 50% { opacity: 0.35; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="0" y="0" width="1280" height="500" rx="14" fill="#111118"/>
  <rect x="2" y="2" width="1276" height="496" rx="13" fill="#18181f" stroke="#2a2833" stroke-width="1"/>
  <line x1="24" y1="13" x2="1256" y2="13" stroke="#2a2833" stroke-width="0.5"/>
  <line x1="24" y1="487" x2="1256" y2="487" stroke="#2a2833" stroke-width="0.5"/>
  <rect x="28" y="22" width="1224" height="452" rx="6" fill="#08060d"/>

  <g clip-path="url(#sc)">
    <g stroke="url(#grid)" stroke-width="0.6" opacity="0.5">
      <line x1="640" y1="340" x2="40" y2="474"/><line x1="640" y1="340" x2="220" y2="474"/>
      <line x1="640" y1="340" x2="400" y2="474"/><line x1="640" y1="340" x2="540" y2="474"/>
      <line x1="640" y1="340" x2="640" y2="474"/><line x1="640" y1="340" x2="740" y2="474"/>
      <line x1="640" y1="340" x2="880" y2="474"/><line x1="640" y1="340" x2="1060" y2="474"/>
      <line x1="640" y1="340" x2="1240" y2="474"/>
    </g>
    <g stroke="#00fffe" stroke-width="0.5" opacity="0.22">
      <line x1="120" y1="380" x2="1160" y2="380"/><line x1="80" y1="416" x2="1200" y2="416"/><line x1="48" y1="452" x2="1232" y2="452"/>
    </g>
    <rect x="28" y="22" width="1224" height="3" fill="#00fffe" opacity="0.05" style="animation: sweep 9s linear infinite;"/>
    <rect x="28" y="22" width="1224" height="452" fill="#ffffff" opacity="0" style="animation: phosphorBloom 8s ease-in-out infinite;"/>
  </g>
  <rect x="28" y="22" width="1224" height="452" rx="6" fill="url(#scan)"/>
  <rect x="28" y="22" width="1224" height="452" rx="6" fill="url(#vig)"/>
  <rect x="28" y="22" width="1224" height="452" rx="6" fill="none" stroke="#00fffe" stroke-width="1" opacity="0.07" stroke-dasharray="22,3318" style="animation: edgeGlow 11s linear infinite;"/>
  <rect x="28" y="22" width="1224" height="452" rx="6" fill="none" stroke="#1a1825"/>

  <g stroke="#00fffe" stroke-width="1.4" fill="none" opacity="0.6">
    <path d="M56 54 h26 M56 54 v26"/><path d="M1224 54 h-26 M1224 54 v26"/>
    <path d="M56 442 h26 M56 442 v-26"/><path d="M1224 442 h-26 M1224 442 v-26"/>
  </g>

  <g style="animation: flicker 7s infinite;">
    <text x="640" y="74" text-anchor="middle" font-size="13" fill="#5a5869" letter-spacing="7" filter="url(#phos)">I T A S H A . C O R P</text>
    <g font-size="60" font-weight="bold" letter-spacing="6" text-anchor="middle">
      <text x="643" y="140" fill="#ff2d78" opacity="0.55" filter="url(#soft)">F0RG3-W1R3</text>
      <text x="637" y="140" fill="#00fffe" opacity="0.55" filter="url(#soft)">F0RG3-W1R3</text>
      <text x="640" y="140" fill="#e9f7ff" filter="url(#glow)">F0RG3-W1R3</text>
    </g>
    <text x="640" y="172" text-anchor="middle" font-size="14" fill="#a020ff" letter-spacing="3" filter="url(#phos)">forge an installer from a binary · wire it onto every platform</text>

    <g filter="url(#phos)">
      <text x="64" y="222" font-size="12" fill="#5a5869">forge --app c0pl4nd ───────────────────────</text>
      <text x="84" y="250" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 0.2s both;">&gt; load packager.template.toml + override</text>
      <text x="544" y="250" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 0.2s both;">[ OK ]</text>
      <text x="84" y="276" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 0.5s both;">&gt; resolve compiled binary (never source)</text>
      <text x="544" y="276" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 0.5s both;">[ OK ]</text>
      <text x="84" y="302" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 0.8s both;">&gt; forge  nsis · dmg · appimage · deb</text>
      <text x="544" y="302" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 0.8s both;">[ OK ]</text>
      <text x="84" y="328" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 1.1s both;">&gt; sign  minisign · authenticode · ad-hoc</text>
      <text x="544" y="328" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 1.1s both;">[ OK ]</text>
      <text x="84" y="354" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 1.4s both;">&gt; emit  checksum.sha256 + wizard art</text>
      <text x="544" y="354" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 1.4s both;">[ OK ]</text>
      <text x="64" y="382" font-size="12" fill="#5a5869">────────────────────────────────────────────</text>
      <text x="64" y="416" font-size="13" fill="#01fe36">root@itasha:forge$</text>
      <rect x="232" y="404" width="11" height="16" fill="#00fffe" style="animation: curBlink 1.1s step-end infinite;"/>
      <text x="64" y="448" font-size="11" fill="#5a5869" letter-spacing="2">one config · every platform</text>
    </g>

    <g transform="translate(872, 206)">
      <text x="92" y="158" fill="#a020ff" font-size="46" opacity="0.16" font-family="'Noto Sans JP','Yu Gothic',sans-serif">鍛造</text>
      <line x1="48" y1="6" x2="48" y2="196" stroke="#00fffe" stroke-width="2.4" filter="url(#glow)"/>
      <circle cx="48" cy="6" r="4" fill="#00fffe" opacity="0.9" filter="url(#glow)"/>
      <path d="M55 2 Q74 -14 58 -30" fill="none" stroke="#ff0040" stroke-width="1.6" opacity="0.85" filter="url(#glow)"/>
      <g>
        <line x1="48" y1="40" x2="206" y2="40" stroke="#00fffe" stroke-width="1.5" stroke-dasharray="6,3" style="animation: signalPulse 1.6s linear infinite;"/>
        <circle cx="206" cy="40" r="5" fill="none" stroke="#00fffe" stroke-width="1.5" style="animation: nodeBlink 2s ease-in-out infinite;"/>
        <circle cx="206" cy="40" r="2" fill="#00fffe" style="animation: nodeBlink 2s ease-in-out infinite;"/>
        <text x="218" y="44" fill="#5a5869" font-size="9">NSIS</text>
      </g>
      <g>
        <line x1="48" y1="86" x2="196" y2="86" stroke="#ff2d78" stroke-width="1.5" stroke-dasharray="6,3" style="animation: signalPulse 2s linear infinite;"/>
        <circle cx="196" cy="86" r="5" fill="none" stroke="#ff2d78" stroke-width="1.5" style="animation: nodeBlink 2s ease-in-out 0.4s infinite;"/>
        <circle cx="196" cy="86" r="2" fill="#ff2d78" style="animation: nodeBlink 2s ease-in-out 0.4s infinite;"/>
        <text x="208" y="90" fill="#5a5869" font-size="9">DMG</text>
      </g>
      <g>
        <line x1="48" y1="132" x2="226" y2="132" stroke="#a020ff" stroke-width="1.5" stroke-dasharray="6,3" style="animation: signalPulse 2.4s linear infinite;"/>
        <circle cx="226" cy="132" r="5" fill="none" stroke="#a020ff" stroke-width="1.5" style="animation: nodeBlink 2s ease-in-out 0.8s infinite;"/>
        <circle cx="226" cy="132" r="2" fill="#a020ff" style="animation: nodeBlink 2s ease-in-out 0.8s infinite;"/>
        <text x="238" y="136" fill="#5a5869" font-size="9">APPIMAGE</text>
      </g>
      <g>
        <line x1="48" y1="178" x2="178" y2="178" stroke="#01fe36" stroke-width="1.5" stroke-dasharray="6,3" style="animation: signalPulse 2.8s linear infinite;"/>
        <circle cx="178" cy="178" r="5" fill="none" stroke="#01fe36" stroke-width="1.5" style="animation: nodeBlink 2s ease-in-out 1.2s infinite;"/>
        <circle cx="178" cy="178" r="2" fill="#01fe36" style="animation: nodeBlink 2s ease-in-out 1.2s infinite;"/>
        <text x="190" y="182" fill="#5a5869" font-size="9">DEB</text>
      </g>
    </g>
  </g>

  <circle cx="50" cy="470" r="4" fill="#01fe36" opacity="0.55" style="animation: heartbeat 2.4s ease-in-out infinite;"/>
  <circle cx="64" cy="470" r="3" fill="#00fffe" opacity="0.4"/>
  <circle cx="76" cy="470" r="3" fill="#5a5869" opacity="0.3"/>
  <text x="96" y="473" font-size="9" fill="#2a2833" letter-spacing="2">ITASHA.CORP</text>
  <text x="1116" y="473" font-size="9" fill="#2a2833">CRT-IC // FORGE</text>
  <circle cx="1232" cy="470" r="5" fill="#01fe36" style="animation: heartbeat 2.4s ease-in-out infinite;"/>
</svg>
