    <text x="640" y="86" text-anchor="middle" font-size="13" fill="#5a5869" letter-spacing="7">I T A S H A . C O R P</text>
    <g font-size="62" font-weight="bold" letter-spacing="6" text-anchor="middle">
      <text x="643" y="158" fill="#ff2d78" opacity="0.55" filter="url(#soft)">F0RG3-W1R3</text>
      <text x="637" y="158" fill="#00fffe" opacity="0.55" filter="url(#soft)">F0RG3-W1R3</text>
      <text x="640" y="158" fill="#e9f7ff">F0RG3-W1R3</text>
    </g>
    <text x="640" y="190" text-anchor="middle" font-size="15" fill="#a020ff" letter-spacing="3">forge an installer from a binary · wire it onto every platform</text>
    <text x="160" y="240" font-size="12" fill="#5a5869">root@itasha:~# ./forge --app c0pl4nd ──────────────────────────────────────</text>
    <text x="180" y="266" font-size="12.5" fill="#00fffe">&gt; load packager.template.toml + per-app override</text>
    <text x="1010" y="266" font-size="12.5" fill="#01fe36">[ OK ]</text>
    <text x="180" y="290" font-size="12.5" fill="#00fffe">&gt; resolve compiled binary (never source)</text>
    <text x="1010" y="290" font-size="12.5" fill="#01fe36">[ OK ]</text>
    <text x="180" y="314" font-size="12.5" fill="#00fffe">&gt; forge  nsis · dmg · appimage · deb</text>
    <text x="1010" y="314" font-size="12.5" fill="#01fe36">[ OK ]</text>
    <text x="180" y="338" font-size="12.5" fill="#00fffe">&gt; sign  minisign · authenticode · ad-hoc</text>
    <text x="1010" y="338" font-size="12.5" fill="#01fe36">[ OK ]</text>
    <text x="180" y="362" font-size="12.5" fill="#00fffe">&gt; emit  checksum.sha256 + branded wizard art</text>
    <text x="1010" y="362" font-size="12.5" fill="#01fe36">[ OK ]</text>
    <text x="160" y="404" font-size="12" fill="#5a5869">windows · macos · linux .............................................</text>
    <text x="1010" y="404" font-size="12" fill="#01fe36" font-weight="bold">[ 0NL1N3 ]</text>
    <text x="1086" y="404" font-size="12.5" fill="#00fffe">&#x2588;</text>
  </g>
