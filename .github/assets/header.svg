<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 549" width="1280" height="549" role="img" aria-label="F0RG3-W1R3 — forge an installer from a binary, wire it onto every platform">
  <defs>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="1280" height="4">
      <rect width="1280" height="2" fill="transparent"/><rect y="2" width="1280" height="2" fill="rgba(0,0,0,0.16)"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="48%" r="72%">
      <stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
    </radialGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34e0d0" stop-opacity="0"/><stop offset="100%" stop-color="#34e0d0" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="phos"><feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="2.4"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="sc"><rect x="28" y="22" width="1224" height="501" rx="6"/></clipPath>
    <radialGradient id="glass" cx="36%" cy="22%" r="62%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/><stop offset="55%" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
    <pattern id="phosmask" width="3" height="1" patternUnits="userSpaceOnUse"><rect width="1" height="1" x="0" fill="#ff2a2a"/><rect width="1" height="1" x="1" fill="#2aff2a"/><rect width="1" height="1" x="2" fill="#2a2aff"/></pattern>
  </defs>
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace; }
    @keyframes sweep { 0% { transform: translateY(0); } 100% { transform: translateY(501px); } }
    @keyframes flicker { 0%,96%,100% { opacity: 1; } 97% { opacity: 0.97; } 98% { opacity: 0.995; } }
    @keyframes bootReveal { 0% { opacity: 0; } 100% { opacity: 0.92; } }
    @keyframes curBlink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    @keyframes heartbeat { 0%,100% { transform: scale(1); opacity: 0.55; } 15% { transform: scale(1.3); opacity: 0.95; } 30% { transform: scale(1); opacity: 0.55; } 50% { transform: scale(1.1); opacity: 0.8; } }
    @keyframes edgeGlow { 0% { stroke-dashoffset: 3450; } 100% { stroke-dashoffset: 0; } }
    @keyframes phosphorBloom { 0%,100% { opacity: 0; } 50% { opacity: 0.02; } }
    @keyframes signalPulse { 0% { stroke-dashoffset: 18; opacity: 0.85; } 100% { stroke-dashoffset: 0; opacity: 0.3; } }
    @keyframes nodeBlink { 0%,100% { opacity: 0.9; } 50% { opacity: 0.35; } }
    @keyframes forgeTravel { 0% { transform: translateY(0); opacity: 0; } 8% { opacity: 1; } 88% { opacity: 1; } 100% { transform: translateY(140px); opacity: 0; } }
    @keyframes cardForge { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
    @keyframes kanjiPulse { 0%,100% { opacity: 0.1; } 50% { opacity: 0.2; } }
    @keyframes rollBar { 0% { transform: translateY(-70px); } 100% { transform: translateY(540px); } }
    @keyframes dataBlink { 0%,100% { opacity: 0.12; } 50% { opacity: 0.7; } }
    @keyframes titleGlitch { 0%,90%,100% { transform: translate(0,0); } 91% { transform: translate(-2px,1px); } 94% { transform: translate(2px,-1px); } 97% { transform: translate(-1px,0); } }
    @keyframes okPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes linePulse { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }
    @keyframes titleBreathe { 0%,100% { opacity: 1; } 50% { opacity: 0.85; } }
    @keyframes crtBlank { 0%,90% { opacity: 0; } 91.5% { opacity: 1; } 97% { opacity: 1; } 98.6% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes crtLine { 0%,89.5% { opacity: 0; transform: scaleY(1); } 90.4% { opacity: 0.95; transform: scaleY(0.03); } 91.4% { opacity: 0; transform: scaleY(0.01); } 97.4% { opacity: 0; transform: scaleY(0.02); } 98.2% { opacity: 0.95; transform: scaleY(0.08); } 99.2% { opacity: 0; transform: scaleY(1); } 100% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="0" y="0" width="1280" height="549" rx="14" fill="#0b0f12"/>
  <rect x="2" y="2" width="1276" height="545" rx="13" fill="#1a242b" stroke="#2a3a42" stroke-width="1"/>
  <line x1="24" y1="13" x2="1256" y2="13" stroke="#2a3a42" stroke-width="0.5"/>
  <line x1="24" y1="529" x2="1256" y2="529" stroke="#2a3a42" stroke-width="0.5"/>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="#070a0c"/>

  <g clip-path="url(#sc)">
    <g stroke="url(#grid)" stroke-width="0.6" opacity="0.5">
      <line x1="640" y1="372" x2="40" y2="523"/><line x1="640" y1="372" x2="220" y2="523"/>
      <line x1="640" y1="372" x2="400" y2="523"/><line x1="640" y1="372" x2="540" y2="523"/>
      <line x1="640" y1="372" x2="640" y2="523"/><line x1="640" y1="372" x2="740" y2="523"/>
      <line x1="640" y1="372" x2="900" y2="523"/><line x1="640" y1="372" x2="1060" y2="523"/>
      <line x1="640" y1="372" x2="1240" y2="523"/>
    </g>
    <g stroke="#34e0d0" stroke-width="0.5" opacity="0.2">
      <line x1="120" y1="430" x2="1160" y2="430"/><line x1="80" y1="476" x2="1200" y2="476"/><line x1="48" y1="514" x2="1232" y2="514"/>
    </g>
    <!-- ambient "the wired" data nodes -->
    <g fill="#34e0d0">
      <circle cx="360" cy="470" r="1.6" style="animation: dataBlink 2.6s ease-in-out 0s infinite;"/>
      <circle cx="700" cy="502" r="1.6" style="animation: dataBlink 3.1s ease-in-out 0.8s infinite;"/>
      <circle cx="980" cy="452" r="1.6" style="animation: dataBlink 2.4s ease-in-out 1.4s infinite;"/>
      <circle cx="498" cy="510" r="1.6" fill="#5050ff" style="animation: dataBlink 3.4s ease-in-out 2s infinite;"/>
    </g>
    <!-- CRT roll bar: soft band drifting down the screen -->
    <rect x="28" y="22" width="1224" height="46" fill="#9fe8e0" opacity="0.035" style="animation: rollBar 7s linear infinite;"/>
    <rect x="28" y="22" width="1224" height="3" fill="#34e0d0" opacity="0.05" style="animation: sweep 9s linear infinite;"/>
    <rect x="28" y="22" width="1224" height="501" fill="#ffffff" opacity="0" style="animation: phosphorBloom 8s ease-in-out infinite;"/>
  </g>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="url(#scan)"/>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="url(#vig)"/>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="url(#phosmask)" opacity="0.04"/>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="url(#glass)"/>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="none" stroke="#34e0d0" stroke-width="1" opacity="0.07" stroke-dasharray="22,3428" style="animation: edgeGlow 11s linear infinite;"/>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="none" stroke="#1a242b"/>

  <g stroke="#34e0d0" stroke-width="1.4" fill="none" opacity="0.55">
    <path d="M56 54 h26 M56 54 v26"/><path d="M1224 54 h-26 M1224 54 v26"/>
    <path d="M56 491 h26 M56 491 v-26"/><path d="M1224 491 h-26 M1224 491 v-26"/>
  </g>

  <g style="animation: flicker 7s infinite;">
    <text x="640" y="74" text-anchor="middle" font-size="13" fill="#5a6b73" letter-spacing="7" filter="url(#phos)" style="font-family: 'Times New Roman','Times','Matisse',serif; font-weight: 700; transform: scaleX(0.82); transform-origin: 640px 74px; animation: titleBreathe 6s ease-in-out infinite;">I T A S H A . C O R P</text>
    <g font-size="60" font-weight="bold" letter-spacing="6" text-anchor="middle">
      <text x="643" y="140" fill="#8c6cd0" opacity="0.5" filter="url(#soft)" style="animation: titleGlitch 5.5s steps(1) infinite; transform-origin: 640px 140px;">F0RG3-W1R3</text>
      <text x="637" y="140" fill="#34e0d0" opacity="0.5" filter="url(#soft)" style="animation: titleGlitch 6.3s steps(1) 0.1s infinite; transform-origin: 640px 140px;">F0RG3-W1R3</text>
      <text x="640" y="140" fill="#e9f7ff" filter="url(#glow)" style="animation: titleBreathe 4s ease-in-out infinite;">F0RG3-W1R3</text>
    </g>
    <text x="640" y="172" text-anchor="middle" font-size="14" fill="#8c6cd0" letter-spacing="3" filter="url(#phos)">forge an installer from a binary · wire it onto every platform</text>

    <g filter="url(#phos)">
      <text x="64" y="222" font-size="12" fill="#5a6b73">forge --app c0pl4nd ───────────────────────</text>
      <text x="84" y="250" font-size="12.5" fill="#34e0d0" style="animation: bootReveal 0.35s ease-out 0.2s both;, linePulse 3.6s ease-in-out 0.0s infinite">&gt; load packager.template.toml + override</text>
      <text x="544" y="250" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 0.2s both, okPulse 2s ease-in-out 0.6s infinite;">[ OK ]</text>
      <text x="84" y="276" font-size="12.5" fill="#34e0d0" style="animation: bootReveal 0.35s ease-out 0.5s both;, linePulse 3.6s ease-in-out 0.4s infinite">&gt; resolve compiled binary (never source)</text>
      <text x="544" y="276" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 0.5s both, okPulse 2s ease-in-out 1.0s infinite;">[ OK ]</text>
      <text x="84" y="302" font-size="12.5" fill="#34e0d0" style="animation: bootReveal 0.35s ease-out 0.8s both;, linePulse 3.6s ease-in-out 0.8s infinite">&gt; forge  nsis · dmg · appimage · deb</text>
      <text x="544" y="302" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 0.8s both, okPulse 2s ease-in-out 1.4s infinite;">[ OK ]</text>
      <text x="84" y="328" font-size="12.5" fill="#34e0d0" style="animation: bootReveal 0.35s ease-out 1.1s both;, linePulse 3.6s ease-in-out 1.2s infinite">&gt; sign  minisign · authenticode · ad-hoc</text>
      <text x="544" y="328" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 1.1s both, okPulse 2s ease-in-out 1.8s infinite;">[ OK ]</text>
      <text x="84" y="354" font-size="12.5" fill="#34e0d0" style="animation: bootReveal 0.35s ease-out 1.4s both;, linePulse 3.6s ease-in-out 1.6s infinite">&gt; emit  checksum.sha256 + wizard art</text>
      <text x="544" y="354" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 1.4s both, okPulse 2s ease-in-out 2.2s infinite;">[ OK ]</text>
      <text x="64" y="382" font-size="12" fill="#5a6b73">────────────────────────────────────────────</text>
      <text x="64" y="416" font-size="13" fill="#6fb89a">root@itasha:forge$</text>
      <rect x="232" y="404" width="11" height="16" fill="#34e0d0" style="animation: curBlink 1.1s step-end infinite;"/>
      <text x="64" y="448" font-size="11" fill="#5a6b73" letter-spacing="2">one config · every platform</text>
    </g>

    <g transform="translate(880, 222)" style="animation: flicker 9s infinite;">
      <text x="86" y="180" fill="#8c6cd0" font-size="50" font-family="'Noto Sans JP','Yu Gothic',sans-serif" style="animation: kanjiPulse 6s ease-in-out infinite;">鍛造</text>
      <g opacity="0.85">
        <rect x="6" y="6" width="60" height="46" rx="3" fill="none" stroke="#34e0d0" stroke-width="1.4" filter="url(#phos)"/>
        <text x="36" y="26" text-anchor="middle" font-size="9" fill="#34e0d0" letter-spacing="1.2">BIN</text>
        <text x="36" y="40" text-anchor="middle" font-size="7" fill="#5a6b73" letter-spacing="0.6">a.out</text>
        <line x1="36" y1="52" x2="36" y2="74" stroke="#34e0d0" stroke-width="1.2" stroke-dasharray="3,2" style="animation: signalPulse 1.6s linear infinite;"/>
      </g>
      <g transform="translate(0, 78)" filter="url(#phos)">
        <rect x="6" y="0" width="84" height="22" rx="2" fill="none" stroke="#34e0d0" stroke-width="1.1" opacity="0.9"/>
        <rect x="8" y="2" width="3" height="18" fill="#34e0d0" style="animation: cardForge 2.8s ease-in-out 0s infinite;"/>
        <text x="18" y="14" font-size="9" fill="#34e0d0" letter-spacing="1.6">NSIS .exe</text>
        <path d="M94 11 l8 0 l-3 -3 m3 3 l-3 3" stroke="#5a6b73" stroke-width="1" fill="none"/>
        <rect x="108" y="2" width="22" height="18" rx="1" fill="none" stroke="#5a6b73" stroke-width="0.8"/>
        <text x="119" y="14" text-anchor="middle" font-size="6.5" fill="#5a6b73">WIN</text>
      </g>
      <g transform="translate(0, 110)" filter="url(#phos)">
        <rect x="6" y="0" width="84" height="22" rx="2" fill="none" stroke="#8c6cd0" stroke-width="1.1" opacity="0.9"/>
        <rect x="8" y="2" width="3" height="18" fill="#8c6cd0" style="animation: cardForge 2.8s ease-in-out 0.5s infinite;"/>
        <text x="18" y="14" font-size="9" fill="#8c6cd0" letter-spacing="1.6">DMG .img</text>
        <path d="M94 11 l8 0 l-3 -3 m3 3 l-3 3" stroke="#5a6b73" stroke-width="1" fill="none"/>
        <rect x="108" y="2" width="22" height="18" rx="1" fill="none" stroke="#5a6b73" stroke-width="0.8"/>
        <text x="119" y="14" text-anchor="middle" font-size="6.5" fill="#5a6b73">MAC</text>
      </g>
      <g transform="translate(0, 142)" filter="url(#phos)">
        <rect x="6" y="0" width="84" height="22" rx="2" fill="none" stroke="#f2b33d" stroke-width="1.1" opacity="0.9"/>
        <rect x="8" y="2" width="3" height="18" fill="#f2b33d" style="animation: cardForge 2.8s ease-in-out 1s infinite;"/>
        <text x="18" y="14" font-size="9" fill="#f2b33d" letter-spacing="1.4">APPIMAGE</text>
        <path d="M94 11 l8 0 l-3 -3 m3 3 l-3 3" stroke="#5a6b73" stroke-width="1" fill="none"/>
        <rect x="108" y="2" width="22" height="18" rx="1" fill="none" stroke="#5a6b73" stroke-width="0.8"/>
        <text x="119" y="14" text-anchor="middle" font-size="6.5" fill="#5a6b73">LIN</text>
      </g>
      <g transform="translate(0, 174)" filter="url(#phos)">
        <rect x="6" y="0" width="84" height="22" rx="2" fill="none" stroke="#6fb89a" stroke-width="1.1" opacity="0.9"/>
        <rect x="8" y="2" width="3" height="18" fill="#6fb89a" style="animation: cardForge 2.8s ease-in-out 1.5s infinite;"/>
        <text x="18" y="14" font-size="9" fill="#6fb89a" letter-spacing="1.6">DEB .pkg</text>
        <path d="M94 11 l8 0 l-3 -3 m3 3 l-3 3" stroke="#5a6b73" stroke-width="1" fill="none"/>
        <rect x="108" y="2" width="22" height="18" rx="1" fill="none" stroke="#5a6b73" stroke-width="0.8"/>
        <text x="119" y="14" text-anchor="middle" font-size="6.5" fill="#5a6b73">DEB</text>
      </g>
      <line x1="36" y1="52" x2="36" y2="196" stroke="#34e0d0" stroke-width="0.6" opacity="0.25"/>
      <line x1="36" y1="89" x2="6" y2="89" stroke="#34e0d0" stroke-width="0.6" opacity="0.4"/>
      <line x1="36" y1="121" x2="6" y2="121" stroke="#8c6cd0" stroke-width="0.6" opacity="0.4"/>
      <line x1="36" y1="153" x2="6" y2="153" stroke="#f2b33d" stroke-width="0.6" opacity="0.4"/>
      <line x1="36" y1="185" x2="6" y2="185" stroke="#6fb89a" stroke-width="0.6" opacity="0.4"/>
      <circle cx="36" cy="56" r="2.6" fill="#e9f7ff" filter="url(#glow)" style="animation: forgeTravel 2.8s ease-in-out infinite;"/>
      <g transform="translate(174, 78)" style="animation: nodeBlink 3s ease-in-out infinite;">
        <rect x="0" y="0" width="36" height="118" rx="2" fill="none" stroke="#34e0d0" stroke-width="0.8" opacity="0.35"/>
        <text x="18" y="14" text-anchor="middle" font-size="6.5" fill="#5a6b73" letter-spacing="1">SIGN</text>
        <line x1="6" y1="24" x2="30" y2="24" stroke="#5a6b73" stroke-width="0.5" opacity="0.5"/>
        <text x="18" y="38" text-anchor="middle" font-size="6" fill="#34e0d0" opacity="0.7">minisig</text>
        <text x="18" y="52" text-anchor="middle" font-size="6" fill="#34e0d0" opacity="0.7">authcode</text>
        <text x="18" y="66" text-anchor="middle" font-size="6" fill="#34e0d0" opacity="0.7">ad-hoc</text>
        <line x1="6" y1="78" x2="30" y2="78" stroke="#5a6b73" stroke-width="0.5" opacity="0.5"/>
        <text x="18" y="92" text-anchor="middle" font-size="6.5" fill="#33ff66" opacity="0.85">.sha256</text>
        <text x="18" y="106" text-anchor="middle" font-size="6.5" fill="#33ff66" opacity="0.85" style="animation: cardForge 2.8s ease-in-out 2s infinite;">VERIFY</text>
      </g>
    </g>
  </g>

  <g>
    <circle cx="56" cy="536" r="3.5" fill="#6fb89a" opacity="0.7" style="animation: heartbeat 2.4s ease-in-out infinite; transform-origin: 56px 536px;"/>
    <circle cx="71" cy="536" r="3" fill="#34e0d0" opacity="0.45"/>
    <circle cx="86" cy="536" r="3" fill="#5050ff" opacity="0.4"/>
    <text x="108" y="536" font-size="9" fill="#3a4a52" letter-spacing="3.2" dominant-baseline="central">ITASHA.CORP</text>
    <text x="640" y="536" font-size="9" fill="#3a4a52" letter-spacing="3" dominant-baseline="central" text-anchor="middle">FORGE-WIRE</text>
    <text x="1208" y="536" font-size="9" fill="#3a4a52" letter-spacing="2.4" dominant-baseline="central" text-anchor="end">CRT-IC v2</text>
    <circle cx="1224" cy="536" r="4" fill="#6fb89a" opacity="0.5"/>
    <circle cx="1224" cy="536" r="2" fill="#6fb89a" opacity="0.95" style="animation: heartbeat 2.4s ease-in-out infinite; transform-origin: 1224px 536px;"/>
  </g>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="#050608" opacity="0" style="animation: crtBlank 14s ease-in-out infinite;"/>
  <rect x="28" y="271.0" width="1224" height="3" fill="#e9f7ff" opacity="0" style="animation: crtLine 14s ease-in-out infinite; transform-origin: 640px 272.5px;"/>
