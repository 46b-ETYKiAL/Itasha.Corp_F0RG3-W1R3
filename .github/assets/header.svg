    <path d="M56 491 h26 M56 491 v-26"/><path d="M1224 491 h-26 M1224 491 v-26"/>
  </g>

  <g style="animation: flicker 7s infinite;">
    <text x="640" y="74" text-anchor="middle" font-size="13" fill="#5a5869" letter-spacing="7" filter="url(#phos)">I T A S H A . C O R P</text>
    <g font-size="60" font-weight="bold" letter-spacing="6" text-anchor="middle">
      <text x="643" y="140" fill="#ff2d78" opacity="0.55" filter="url(#soft)">F0RG3-W1R3</text>
      <text x="637" y="140" fill="#00fffe" opacity="0.55" filter="url(#soft)">F0RG3-W1R3</text>
      <text x="640" y="140" fill="#e9f7ff" filter="url(#glow)">F0RG3-W1R3</text>
    </g>
    <text x="640" y="172" text-anchor="middle" font-size="14" fill="#a020ff" letter-spacing="3" filter="url(#phos)">forge an installer from a binary · wire it onto every platform</text>

    <g filter="url(#phos)">
      <text x="64" y="222" font-size="12" fill="#5a5869">forge --app c0pl4nd ───────────────────────</text>
      <text x="84" y="250" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 0.2s both;">&gt; load packager.template.toml + override</text>
      <text x="544" y="250" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 0.2s both;">[ OK ]</text>
      <text x="84" y="276" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 0.5s both;">&gt; resolve compiled binary (never source)</text>
      <text x="544" y="276" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 0.5s both;">[ OK ]</text>
      <text x="84" y="302" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 0.8s both;">&gt; forge  nsis · dmg · appimage · deb</text>
      <text x="544" y="302" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 0.8s both;">[ OK ]</text>
      <text x="84" y="328" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 1.1s both;">&gt; sign  minisign · authenticode · ad-hoc</text>
      <text x="544" y="328" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 1.1s both;">[ OK ]</text>
      <text x="84" y="354" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 1.4s both;">&gt; emit  checksum.sha256 + wizard art</text>
      <text x="544" y="354" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 1.4s both;">[ OK ]</text>
      <text x="64" y="382" font-size="12" fill="#5a5869">────────────────────────────────────────────</text>
      <text x="64" y="416" font-size="13" fill="#01fe36">root@itasha:forge$</text>
      <rect x="232" y="404" width="11" height="16" fill="#00fffe" style="animation: curBlink 1.1s step-end infinite;"/>
      <text x="64" y="448" font-size="11" fill="#5a5869" letter-spacing="2">one config · every platform</text>
    </g>

    <g transform="translate(880, 222)" style="animation: flicker 9s infinite;">
      <text x="86" y="180" fill="#a020ff" font-size="50" opacity="0.14" font-family="'Noto Sans JP','Yu Gothic',sans-serif">鍛造</text>
      <g opacity="0.85">
        <rect x="6" y="6" width="60" height="46" rx="3" fill="none" stroke="#00fffe" stroke-width="1.4" filter="url(#phos)"/>
        <text x="36" y="26" text-anchor="middle" font-size="9" fill="#00fffe" letter-spacing="1.2">BIN</text>
        <text x="36" y="40" text-anchor="middle" font-size="7" fill="#5a5869" letter-spacing="0.6">a.out</text>
        <line x1="36" y1="52" x2="36" y2="74" stroke="#00fffe" stroke-width="1.2" stroke-dasharray="3,2" style="animation: signalPulse 1.6s linear infinite;"/>
      </g>
      <g transform="translate(0, 78)" filter="url(#phos)">
        <rect x="6" y="0" width="84" height="22" rx="2" fill="none" stroke="#00fffe" stroke-width="1.1" opacity="0.9"/>
        <rect x="8" y="2" width="3" height="18" fill="#00fffe" opacity="0.4"/>
        <text x="18" y="14" font-size="9" fill="#00fffe" letter-spacing="1.6">NSIS .exe</text>
        <path d="M94 11 l8 0 l-3 -3 m3 3 l-3 3" stroke="#5a5869" stroke-width="1" fill="none"/>
        <rect x="108" y="2" width="22" height="18" rx="1" fill="none" stroke="#5a5869" stroke-width="0.8"/>
        <text x="119" y="14" text-anchor="middle" font-size="6.5" fill="#5a5869">WIN</text>
      </g>
      <g transform="translate(0, 110)" filter="url(#phos)">
        <rect x="6" y="0" width="84" height="22" rx="2" fill="none" stroke="#ff2d78" stroke-width="1.1" opacity="0.9"/>
        <rect x="8" y="2" width="3" height="18" fill="#ff2d78" opacity="0.4"/>
        <text x="18" y="14" font-size="9" fill="#ff2d78" letter-spacing="1.6">DMG .img</text>
        <path d="M94 11 l8 0 l-3 -3 m3 3 l-3 3" stroke="#5a5869" stroke-width="1" fill="none"/>
        <rect x="108" y="2" width="22" height="18" rx="1" fill="none" stroke="#5a5869" stroke-width="0.8"/>
        <text x="119" y="14" text-anchor="middle" font-size="6.5" fill="#5a5869">MAC</text>
      </g>
      <g transform="translate(0, 142)" filter="url(#phos)">
        <rect x="6" y="0" width="84" height="22" rx="2" fill="none" stroke="#a020ff" stroke-width="1.1" opacity="0.9"/>
        <rect x="8" y="2" width="3" height="18" fill="#a020ff" opacity="0.4"/>
        <text x="18" y="14" font-size="9" fill="#a020ff" letter-spacing="1.4">APPIMAGE</text>
        <path d="M94 11 l8 0 l-3 -3 m3 3 l-3 3" stroke="#5a5869" stroke-width="1" fill="none"/>
        <rect x="108" y="2" width="22" height="18" rx="1" fill="none" stroke="#5a5869" stroke-width="0.8"/>
        <text x="119" y="14" text-anchor="middle" font-size="6.5" fill="#5a5869">LIN</text>
      </g>
      <g transform="translate(0, 174)" filter="url(#phos)">
        <rect x="6" y="0" width="84" height="22" rx="2" fill="none" stroke="#01fe36" stroke-width="1.1" opacity="0.9"/>
        <rect x="8" y="2" width="3" height="18" fill="#01fe36" opacity="0.4"/>
        <text x="18" y="14" font-size="9" fill="#01fe36" letter-spacing="1.6">DEB .pkg</text>
        <path d="M94 11 l8 0 l-3 -3 m3 3 l-3 3" stroke="#5a5869" stroke-width="1" fill="none"/>
        <rect x="108" y="2" width="22" height="18" rx="1" fill="none" stroke="#5a5869" stroke-width="0.8"/>
        <text x="119" y="14" text-anchor="middle" font-size="6.5" fill="#5a5869">DEB</text>
      </g>
      <line x1="36" y1="52" x2="36" y2="196" stroke="#00fffe" stroke-width="0.6" opacity="0.25"/>
      <line x1="36" y1="89" x2="6" y2="89" stroke="#00fffe" stroke-width="0.6" opacity="0.4"/>
      <line x1="36" y1="121" x2="6" y2="121" stroke="#ff2d78" stroke-width="0.6" opacity="0.4"/>
      <line x1="36" y1="153" x2="6" y2="153" stroke="#a020ff" stroke-width="0.6" opacity="0.4"/>
      <line x1="36" y1="185" x2="6" y2="185" stroke="#01fe36" stroke-width="0.6" opacity="0.4"/>
      <g transform="translate(174, 78)" style="animation: nodeBlink 3s ease-in-out infinite;">
        <rect x="0" y="0" width="36" height="118" rx="2" fill="none" stroke="#00fffe" stroke-width="0.8" opacity="0.35"/>
        <text x="18" y="14" text-anchor="middle" font-size="6.5" fill="#5a5869" letter-spacing="1">SIGN</text>
        <line x1="6" y1="24" x2="30" y2="24" stroke="#5a5869" stroke-width="0.5" opacity="0.5"/>
        <text x="18" y="38" text-anchor="middle" font-size="6" fill="#00fffe" opacity="0.7">minisig</text>
        <text x="18" y="52" text-anchor="middle" font-size="6" fill="#00fffe" opacity="0.7">authcode</text>
        <text x="18" y="66" text-anchor="middle" font-size="6" fill="#00fffe" opacity="0.7">ad-hoc</text>
        <line x1="6" y1="78" x2="30" y2="78" stroke="#5a5869" stroke-width="0.5" opacity="0.5"/>
        <text x="18" y="92" text-anchor="middle" font-size="6.5" fill="#01fe36" opacity="0.85">.sha256</text>
        <text x="18" y="106" text-anchor="middle" font-size="6.5" fill="#01fe36" opacity="0.85">VERIFY</text>
      </g>
    </g>
  </g>

  <g>
    <circle cx="56" cy="536" r="3.5" fill="#01fe36" opacity="0.7" style="animation: heartbeat 2.4s ease-in-out infinite;"/>
    <circle cx="71" cy="536" r="3" fill="#00fffe" opacity="0.45"/>
    <circle cx="86" cy="536" r="3" fill="#5a5869" opacity="0.3"/>
    <text x="108" y="536" font-size="9" fill="#3a3848" letter-spacing="3.2" dominant-baseline="central">ITASHA.CORP</text>
    <text x="232" y="536" font-size="9" fill="#2c2a37" dominant-baseline="central">·</text>
    <text x="246" y="536" font-size="9" fill="#3a3848" letter-spacing="2.4" dominant-baseline="central">FORGE-WIRE · CRT-IC v1</text>
    <text x="1208" y="536" font-size="9" fill="#3a3848" letter-spacing="2.4" dominant-baseline="central" text-anchor="end">CRT-IC // FORGE</text>
    <circle cx="1224" cy="536" r="4" fill="#01fe36" opacity="0.5"/>
    <circle cx="1224" cy="536" r="2" fill="#01fe36" opacity="0.95" style="animation: heartbeat 2.4s ease-in-out infinite;"/>
  </g>
