<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 720" width="1680" height="720" role="img" aria-label="F0RG3-W1R3 — forge an installer from a binary, wire it onto every platform">
  <defs>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="1680" height="4">
      <rect width="1680" height="2" fill="transparent"/><rect y="2" width="1680" height="2" fill="rgba(0,0,0,0.16)"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="48%" r="72%">
      <stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.46)"/>
    </radialGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00fffe" stop-opacity="0"/><stop offset="100%" stop-color="#00fffe" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="phos"><feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="2.4"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="sc"><rect x="28" y="22" width="1624" height="672" rx="6"/></clipPath>
  </defs>
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace; }
    @keyframes sweep { 0% { transform: translateY(0); } 100% { transform: translateY(672px); } }
    @keyframes flicker { 0%,96%,100% { opacity: 1; } 97% { opacity: 0.97; } 98% { opacity: 0.995; } }
    @keyframes bootReveal { 0% { opacity: 0; } 100% { opacity: 0.92; } }
    @keyframes curBlink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    @keyframes heartbeat { 0%,100% { r: 4; opacity: 0.55; } 15% { r: 5; opacity: 0.95; } 30% { r: 4; opacity: 0.55; } 50% { r: 4.4; opacity: 0.8; } }
    @keyframes edgeGlow { 0% { stroke-dashoffset: 4600; } 100% { stroke-dashoffset: 0; } }
    @keyframes phosphorBloom { 0%,100% { opacity: 0; } 50% { opacity: 0.02; } }
    @keyframes signalPulse { 0% { stroke-dashoffset: 18; opacity: 0.85; } 100% { stroke-dashoffset: 0; opacity: 0.3; } }
    @keyframes nodeBlink { 0%,100% { opacity: 0.9; } 50% { opacity: 0.35; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="0" y="0" width="1680" height="720" rx="14" fill="#111118"/>
  <rect x="2" y="2" width="1676" height="716" rx="13" fill="#18181f" stroke="#2a2833" stroke-width="1"/>
  <line x1="24" y1="13" x2="1656" y2="13" stroke="#2a2833" stroke-width="0.5"/>
  <line x1="24" y1="700" x2="1656" y2="700" stroke="#2a2833" stroke-width="0.5"/>
  <rect x="28" y="22" width="1624" height="672" rx="6" fill="#08060d"/>

  <g clip-path="url(#sc)">
    <g stroke="url(#grid)" stroke-width="0.6" opacity="0.5">
      <line x1="840" y1="500" x2="40" y2="694"/><line x1="840" y1="500" x2="280" y2="694"/>
      <line x1="840" y1="500" x2="520" y2="694"/><line x1="840" y1="500" x2="700" y2="694"/>
      <line x1="840" y1="500" x2="840" y2="694"/><line x1="840" y1="500" x2="980" y2="694"/>
      <line x1="840" y1="500" x2="1160" y2="694"/><line x1="840" y1="500" x2="1400" y2="694"/>
      <line x1="840" y1="500" x2="1640" y2="694"/>
    </g>
    <g stroke="#00fffe" stroke-width="0.5" opacity="0.22">
      <line x1="120" y1="580" x2="1560" y2="580"/><line x1="80" y1="630" x2="1600" y2="630"/><line x1="48" y1="678" x2="1632" y2="678"/>
    </g>
    <rect x="28" y="22" width="1624" height="3" fill="#00fffe" opacity="0.05" style="animation: sweep 9s linear infinite;"/>
    <rect x="28" y="22" width="1624" height="672" fill="#ffffff" opacity="0" style="animation: phosphorBloom 8s ease-in-out infinite;"/>
  </g>
  <rect x="28" y="22" width="1624" height="672" rx="6" fill="url(#scan)"/>
  <rect x="28" y="22" width="1624" height="672" rx="6" fill="url(#vig)"/>
  <rect x="28" y="22" width="1624" height="672" rx="6" fill="none" stroke="#00fffe" stroke-width="1" opacity="0.07" stroke-dasharray="22,4600" style="animation: edgeGlow 11s linear infinite;"/>
  <rect x="28" y="22" width="1624" height="672" rx="6" fill="none" stroke="#1a1825"/>

  <g stroke="#00fffe" stroke-width="1.4" fill="none" opacity="0.6">
    <path d="M56 54 h26 M56 54 v26"/><path d="M1624 54 h-26 M1624 54 v26"/>
    <path d="M56 662 h26 M56 662 v-26"/><path d="M1624 662 h-26 M1624 662 v-26"/>
  </g>

  <g style="animation: flicker 7s infinite;">
    <text x="840" y="96" text-anchor="middle" font-size="14" fill="#5a5869" letter-spacing="8" filter="url(#phos)">I T A S H A . C O R P</text>
    <g font-size="70" font-weight="bold" letter-spacing="8" text-anchor="middle">
      <text x="843" y="178" fill="#ff2d78" opacity="0.55" filter="url(#soft)">F0RG3-W1R3</text>
      <text x="837" y="178" fill="#00fffe" opacity="0.55" filter="url(#soft)">F0RG3-W1R3</text>
      <text x="840" y="178" fill="#e9f7ff" filter="url(#glow)">F0RG3-W1R3</text>
    </g>
    <text x="840" y="216" text-anchor="middle" font-size="15" fill="#a020ff" letter-spacing="3" filter="url(#phos)">forge an installer from a binary · wire it onto every platform</text>

    <g filter="url(#phos)">
      <text x="80" y="288" font-size="13" fill="#5a5869">forge --app c0pl4nd ────────────────────────</text>
      <text x="100" y="328" font-size="13.5" fill="#00fffe" xml:space="preserve" style="animation: bootReveal 0.35s ease-out 0.2s both;"><tspan>&gt; load packager.template.toml + override</tspan><tspan dx="16" fill="#01fe36">[ OK ]</tspan></text>
      <text x="100" y="362" font-size="13.5" fill="#00fffe" xml:space="preserve" style="animation: bootReveal 0.35s ease-out 0.5s both;"><tspan>&gt; resolve compiled binary (never source)</tspan><tspan dx="16" fill="#01fe36">[ OK ]</tspan></text>
      <text x="100" y="396" font-size="13.5" fill="#00fffe" xml:space="preserve" style="animation: bootReveal 0.35s ease-out 0.8s both;"><tspan>&gt; forge  nsis · dmg · appimage · deb</tspan><tspan dx="16" fill="#01fe36">[ OK ]</tspan></text>
      <text x="100" y="430" font-size="13.5" fill="#00fffe" xml:space="preserve" style="animation: bootReveal 0.35s ease-out 1.1s both;"><tspan>&gt; sign  minisign · authenticode · ad-hoc</tspan><tspan dx="16" fill="#01fe36">[ OK ]</tspan></text>
      <text x="100" y="464" font-size="13.5" fill="#00fffe" xml:space="preserve" style="animation: bootReveal 0.35s ease-out 1.4s both;"><tspan>&gt; emit  checksum.sha256 + wizard art</tspan><tspan dx="16" fill="#01fe36">[ OK ]</tspan></text>
      <text x="80" y="498" font-size="13" fill="#5a5869">────────────────────────────────────────────</text>
      <text x="80" y="536" font-size="14" fill="#01fe36">root@itasha:forge$<tspan dx="8" fill="#00fffe" style="animation: curBlink 1.1s step-end infinite;">█</tspan></text>
      <text x="80" y="572" font-size="11" fill="#5a5869" letter-spacing="2">one config · every platform</text>
    </g>

    <g transform="translate(1130, 296)">
      <text x="106" y="190" fill="#a020ff" font-size="56" opacity="0.16" font-family="'Noto Sans JP','Yu Gothic',sans-serif">鍛造</text>
      <line x1="48" y1="6" x2="48" y2="262" stroke="#00fffe" stroke-width="2.4" filter="url(#glow)"/>
      <circle cx="48" cy="6" r="4" fill="#00fffe" opacity="0.9" filter="url(#glow)"/>
      <path d="M55 2 Q74 -14 58 -30" fill="none" stroke="#ff0040" stroke-width="1.6" opacity="0.85" filter="url(#glow)"/>
      <g>
        <line x1="48" y1="52" x2="226" y2="52" stroke="#00fffe" stroke-width="1.5" stroke-dasharray="6,3" style="animation: signalPulse 1.6s linear infinite;"/>
        <circle cx="226" cy="52" r="5" fill="none" stroke="#00fffe" stroke-width="1.5" style="animation: nodeBlink 2s ease-in-out infinite;"/>
        <circle cx="226" cy="52" r="2" fill="#00fffe" style="animation: nodeBlink 2s ease-in-out infinite;"/>
        <text x="238" y="56" fill="#5a5869" font-size="10">NSIS</text>
      </g>
      <g>
        <line x1="48" y1="116" x2="214" y2="116" stroke="#ff2d78" stroke-width="1.5" stroke-dasharray="6,3" style="animation: signalPulse 2s linear infinite;"/>
        <circle cx="214" cy="116" r="5" fill="none" stroke="#ff2d78" stroke-width="1.5" style="animation: nodeBlink 2s ease-in-out 0.4s infinite;"/>
        <circle cx="214" cy="116" r="2" fill="#ff2d78" style="animation: nodeBlink 2s ease-in-out 0.4s infinite;"/>
        <text x="226" y="120" fill="#5a5869" font-size="10">DMG</text>
      </g>
      <g>
        <line x1="48" y1="180" x2="246" y2="180" stroke="#a020ff" stroke-width="1.5" stroke-dasharray="6,3" style="animation: signalPulse 2.4s linear infinite;"/>
        <circle cx="246" cy="180" r="5" fill="none" stroke="#a020ff" stroke-width="1.5" style="animation: nodeBlink 2s ease-in-out 0.8s infinite;"/>
        <circle cx="246" cy="180" r="2" fill="#a020ff" style="animation: nodeBlink 2s ease-in-out 0.8s infinite;"/>
        <text x="258" y="184" fill="#5a5869" font-size="10">APPIMAGE</text>
      </g>
      <g>
        <line x1="48" y1="244" x2="198" y2="244" stroke="#01fe36" stroke-width="1.5" stroke-dasharray="6,3" style="animation: signalPulse 2.8s linear infinite;"/>
        <circle cx="198" cy="244" r="5" fill="none" stroke="#01fe36" stroke-width="1.5" style="animation: nodeBlink 2s ease-in-out 1.2s infinite;"/>
        <circle cx="198" cy="244" r="2" fill="#01fe36" style="animation: nodeBlink 2s ease-in-out 1.2s infinite;"/>
        <text x="210" y="248" fill="#5a5869" font-size="10">DEB</text>
      </g>
    </g>
  </g>

  <g>
    <circle cx="56" cy="690" r="3.5" fill="#01fe36" opacity="0.7" style="animation: heartbeat 2.4s ease-in-out infinite;"/>
    <circle cx="69" cy="690" r="3" fill="#00fffe" opacity="0.45"/>
    <circle cx="82" cy="690" r="3" fill="#5a5869" opacity="0.3"/>
    <text x="102" y="693" font-size="9" fill="#3a3848" letter-spacing="2">ITASHA.CORP</text>
    <text x="1504" y="693" font-size="9" fill="#3a3848">CRT-IC // FORGE</text>
    <circle cx="1624" cy="690" r="4" fill="#01fe36" opacity="0.5"/>
    <circle cx="1624" cy="690" r="2" fill="#01fe36" opacity="0.95" style="animation: heartbeat 2.4s ease-in-out infinite;"/>
  </g>
</svg>
