<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 170" width="1280" height="170" role="img" aria-label="ITASHA.CORP // F0RG3-W1R3 — one config, every platform">
  <defs>
    <pattern id="scanf" patternUnits="userSpaceOnUse" width="1280" height="4">
      <rect width="1280" height="2" fill="transparent"/><rect y="2" width="1280" height="2" fill="rgba(0,0,0,0.16)"/>
    </pattern>
    <radialGradient id="vigf" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.32)"/>
    </radialGradient>
    <filter id="phosf"><feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clipf"><rect x="20" y="16" width="1240" height="128" rx="4"/></clipPath>
  </defs>
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace; }
    @keyframes sweepf { 0% { transform: translateY(0); } 100% { transform: translateY(128px); } }
    @keyframes flickerf { 0%,95%,100% { opacity: 1; } 96% { opacity: 0.96; } 98% { opacity: 0.99; } }
    @keyframes edgeGlowf { 0% { stroke-dashoffset: 2700; } 100% { stroke-dashoffset: 0; } }
    @keyframes heartbeatf { 0%,100% { r: 3; opacity: 0.5; } 18% { r: 4; opacity: 0.95; } 36% { r: 3; opacity: 0.5; } }
    @keyframes pulsef { 0% { stroke-dashoffset: 16; opacity: 0.8; } 100% { stroke-dashoffset: 0; opacity: 0.25; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
  <rect x="0" y="0" width="1280" height="170" rx="10" fill="#111118"/>
  <rect x="2" y="2" width="1276" height="166" rx="9" fill="#18181f" stroke="#2a2833" stroke-width="1"/>
  <rect x="20" y="16" width="1240" height="128" rx="4" fill="#08060d"/>
  <g clip-path="url(#clipf)">
    <rect x="20" y="16" width="1240" height="3" fill="#00fffe" opacity="0.05" style="animation: sweepf 8s linear infinite;"/>
  </g>
  <rect x="20" y="16" width="1240" height="128" rx="4" fill="url(#scanf)"/>
  <rect x="20" y="16" width="1240" height="128" rx="4" fill="url(#vigf)"/>
  <rect x="20" y="16" width="1240" height="128" rx="4" fill="none" stroke="#00fffe" stroke-width="1" opacity="0.06" stroke-dasharray="18,2682" style="animation: edgeGlowf 10s linear infinite;"/>
  <g stroke="#a020ff" stroke-width="1.2" fill="none" opacity="0.5">
    <path d="M44 40 h20 M44 40 v20"/><path d="M1236 40 h-20 M1236 40 v20"/>
    <path d="M44 130 h20 M44 130 v-20"/><path d="M1236 130 h-20 M1236 130 v-20"/>
  </g>
  <g style="animation: flickerf 7s infinite;" filter="url(#phosf)" text-anchor="middle">
    <text x="640" y="62" font-size="13" fill="#00fffe" letter-spacing="1">one config · every platform · branded installers</text>
    <line x1="372" y1="76" x2="908" y2="76" stroke="#a020ff" stroke-width="1.2" opacity="0.45" stroke-dasharray="6,3" style="animation: pulsef 2.2s linear infinite;"/>
    <text x="640" y="98" font-size="11" fill="#5a5869" letter-spacing="2">FREE-SIGNED (minisign) · CHECKSUM-VERIFIED · NO TELEMETRY · MIT OR APACHE-2.0</text>
    <text x="640" y="126" font-size="9" fill="#2a2833" letter-spacing="4">I T A S H A . C O R P   //   I N S T A L L E R   F R A M E W O R K</text>
  </g>
  <text x="40" y="157" font-size="8" fill="#2a2833" letter-spacing="1">ITASHA.CORP</text>
  <text x="1150" y="157" font-size="8" fill="#2a2833">CRT-IC // FORGE</text>
  <circle cx="1244" cy="154" r="3" fill="#01fe36" opacity="0.6" style="animation: heartbeatf 2.6s ease-in-out infinite;"/>
</svg>
